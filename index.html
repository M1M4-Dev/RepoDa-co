<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Reportes - Telegram</title>
  <style>
    :root {
      --rojo-principal: #d32f2f;
      --rojo-hover: #b71c1c;
      --blanco: #ffffff;
      --fondo: #f4f4f9;
      --borde: #e0e0e0;
      --texto: #333333;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--fondo);
      color: var(--texto);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      margin: 0;
    }

    .contenedor {
      background-color: var(--blanco);
      border-top: 6px solid var(--rojo-principal);
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      padding: 30px;
      width: 100%;
      max-width: 500px;
    }

    h2 {
      color: var(--rojo-principal);
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
    }

    .grupo-input {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"], textarea, input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--borde);
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }

    input[type="file"] {
      padding: 8px;
      background-color: #fafafa;
    }

    button {
      background-color: var(--rojo-principal);
      color: var(--blanco);
      border: none;
      padding: 14px 20px;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover:not(:disabled) {
      background-color: var(--rojo-hover);
    }

    button:disabled {
      background-color: #e57373;
      cursor: not-allowed;
    }

    #mensaje-estado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }

    .exito { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .error { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    .cargando { background-color: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
  </style>
</head>
<body>

  <div class="contenedor">
    <h2>Nuevo Reporte</h2>
    <form id="formularioReporte">
      
      <div class="grupo-input">
        <label for="titulo">Título del Reporte</label>
        <input type="text" id="titulo" required placeholder="Ej: Falla en equipo, Inventario, etc.">
      </div>

      <div class="grupo-input">
        <label for="descripcion">Descripción Detallada</label>
        <textarea id="descripcion" rows="4" required placeholder="Describe los parámetros del reporte..."></textarea>
      </div>

      <div class="grupo-input">
        <label for="imagenes">Adjuntar Imágenes (Máx. 6)</label>
        <input type="file" id="imagenes" accept="image/png, image/jpeg" multiple>
        <small style="color: #666; display: block; margin-top: 6px;">Formatos: JPG, PNG. Las fotos se enviarán a Telegram.</small>
      </div>

      <button type="submit" id="btnEnviar">Registrar en Telegram</button>
    </form>

    <div id="mensaje-estado"></div>
  </div>

  <script>
    // --- CONFIGURACIÓN DE TELEGRAM ---
    // Reemplaza estos valores con los tuyos
    const BOT_TOKEN = 8696207727:AAFOfaU0oDB9HbTz9DKz_33nu9iOYOQfLaw; 
    const CHAT_ID = 5083067164; 

    document.getElementById('formularioReporte').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const inputImagenes = document.getElementById('imagenes');
      const titulo = document.getElementById('titulo').value;
      const descripcion = document.getElementById('descripcion').value;
      const btnEnviar = document.getElementById('btnEnviar');
      const archivos = inputImagenes.files;

      if (archivos.length > 6) {
        mostrarMensaje('Por favor, selecciona un máximo de 6 imágenes.', 'error');
        return;
      }

      try {
        bloquearFormulario(true);
        mostrarMensaje('Generando ticket y subiendo datos a Telegram...', 'cargando');

        // 1. Generar ID único y preparar el texto
        const ticketId = `TKT-${Math.floor(Math.random() * 1000000)}`;
        const textoTelegram = `🚨 *NUEVO REPORTE: ${ticketId}*\n\n*Título:* ${titulo}\n*Descripción:* ${descripcion}\n*Imágenes adjuntas:* ${archivos.length}`;

        // 2. Enviar el texto principal a Telegram
        const resTexto = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: textoTelegram,
            parse_mode: 'Markdown'
          })
        });

        const dataTexto = await resTexto.json();

        if (!dataTexto.ok) throw new Error('Error al enviar el texto a Telegram');

        // Capturar el ID del mensaje principal para responderle con las fotos
        const mensajePrincipalId = dataTexto.result.message_id;

        // 3. Subir las imágenes una por una como respuesta al ticket principal
        if (archivos.length > 0) {
          for (let i = 0; i < archivos.length; i++) {
            mostrarMensaje(`Subiendo imagen ${i + 1} de ${archivos.length}...`, 'cargando');
            
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', archivos[i]);
            formData.append('reply_to_message_id', mensajePrincipalId); // Agrupa las fotos bajo el mensaje

            const resFoto = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
              method: 'POST',
              body: formData
            });

            if (!resFoto.ok) console.warn(`Error subiendo la imagen ${i+1}`);
          }
        }

        mostrarMensaje(`¡Reporte registrado con éxito! Ticket: ${ticketId}`, 'exito');
        document.getElementById('formularioReporte').reset();

      } catch (error) {
        console.error(error);
        mostrarMensaje('Hubo un error de conexión con Telegram. Revisa el Token y el Chat ID.', 'error');
      } finally {
        bloquearFormulario(false);
      }
    });

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById('mensaje-estado');
      div.textContent = texto;
      div.className = tipo;
      div.style.display = 'block';
    }

    function bloquearFormulario(estado) {
      const btn = document.getElementById('btnEnviar');
      btn.disabled = estado;
      btn.textContent = estado ? 'Procesando...' : 'Registrar en Telegram';
      document.getElementById('titulo').disabled = estado;
      document.getElementById('descripcion').disabled = estado;
      document.getElementById('imagenes').disabled = estado;
    }
  </script>
</body>
</html>
